<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defrost | Games</title>
<link rel="icon" type="image/png" href="../../images/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; height: 100%; scrollbar-width: none; }
  ::-webkit-scrollbar { display: none; }
  body { background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; color: #3a8fcf; }
  .container { width: min(900px, 92vw); height: 100vh; max-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 16px 0; }
  .back { display: inline-block; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #3a8fcf; text-decoration: none; margin-bottom: 8px; transition: color 0.2s; flex-shrink: 0; }
  .back:hover { color: #00c8ff; }
  .page-title { font-family: 'Oswald', sans-serif; font-size: clamp(20px, 3vw, 44px); font-weight: 700; letter-spacing: 0.1em; color: #fff; text-transform: uppercase; line-height: 1; margin-bottom: 10px; flex-shrink: 0; }
  #search { background: #000; border: 1px solid #1a3a5c; color: #a8d8f0; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.1em; padding: 7px 14px; width: 100%; outline: none; transition: border-color 0.2s; text-transform: uppercase; margin-bottom: 10px; flex-shrink: 0; }
  #search::placeholder { color: #1e4d7b; }
  #search:focus { border-color: #3a8fcf; }
  .grid-wrap { flex: 1; min-height: 0; overflow: hidden; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: clamp(5px, 0.8vw, 10px); height: 100%; width: 100%; }
  @keyframes slideInRight  { from { opacity:0; transform:translateX(36px);  filter:blur(7px); } to { opacity:1; transform:translateX(0); filter:blur(0); } }
  @keyframes slideInLeft   { from { opacity:0; transform:translateX(-36px); filter:blur(7px); } to { opacity:1; transform:translateX(0); filter:blur(0); } }
  @keyframes slideOutRight { from { opacity:1; transform:translateX(0); filter:blur(0); } to { opacity:0; transform:translateX(36px);  filter:blur(7px); } }
  @keyframes slideOutLeft  { from { opacity:1; transform:translateX(0); filter:blur(0); } to { opacity:0; transform:translateX(-36px); filter:blur(7px); } }
  .grid.anim-in-right  { animation: slideInRight  0.28s ease forwards; }
  .grid.anim-in-left   { animation: slideInLeft   0.28s ease forwards; }
  .grid.anim-out-right { animation: slideOutRight 0.18s ease forwards; }
  .grid.anim-out-left  { animation: slideOutLeft  0.18s ease forwards; }
  .card { background: #0a0a0a; border: 1px solid #1a3a5c; overflow: hidden; position: relative; cursor: pointer; transition: border-color 0.2s, transform 0.2s; text-decoration: none; display: block; width: 100%; height: 100%; }
  .card:hover { border-color: #00c8ff; transform: translateY(-2px); }
  .card img { width:100%; height:100%; object-fit:cover; display:block; transition: opacity 0.2s; color: transparent; }
  .card:hover img { opacity: 0.85; }
  .card::after { content:''; position:absolute; inset:0; box-shadow: inset 0 0 0 0 rgba(0,200,255,0); transition: box-shadow 0.2s; pointer-events:none; }
  .card:hover::after { box-shadow: inset 0 0 20px rgba(0,200,255,0.08); }
  .card-label { position: absolute; bottom:0; left:0; right:0; padding: 6px 10px; background: linear-gradient(to top, rgba(0,0,0,0.85), transparent); font-size: 10px; letter-spacing:0.12em; text-transform:uppercase; color:#a8d8f0; }
  .empty { grid-column: 1/-1; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#1e4d7b; padding:32px 0; }
  .pagination { display: flex; align-items:center; gap:16px; margin-top:10px; flex-shrink: 0; }
  .arrow { background: none; border: 1px solid #1a3a5c; color: #3a8fcf; font-family:'Space Mono',monospace; font-size:14px; padding:6px 14px; cursor:pointer; transition: border-color 0.2s, color 0.2s; line-height:1; }
  .arrow:hover:not(:disabled) { border-color:#00c8ff; color:#00c8ff; }
  .arrow:disabled { color:#1a3a5c; border-color:#0d1f3c; cursor:default; }
  .page-counter { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:#3a8fcf; }
  .page-counter span { color:#fff; }
</style>
</head>
<body>
<div class="container">
  <a href="https://defrostee.github.io/defrost/page/index.html" class="back">← Back</a>
  <div class="page-title">Games</div>
  <input type="text" id="search" placeholder="Search games..." autocomplete="off">
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>
  <div class="pagination">
    <button class="arrow" id="prev">&#8592;</button>
    <div class="page-counter">Page <span id="cur">1</span> of <span id="total">1</span></div>
    <button class="arrow" id="next">&#8594;</button>
  </div>
</div>
<script>
const ALL_GAMES = [
  { title: "Retro Bowl", url: "https://defrostee.github.io/defrost/page/games/g/lXhI18jynyo7dMpXQ9Al/index.html", img: "https://defrostee.github.io/defrost/page/games/i/retro.png" },
  { title: "Neal.fun", url: "https://defrostee.github.io/defrost/page/games/g/xcDUB4nmAfLPYMXLtDD8/index.html", img: "https://defrostee.github.io/defrost/page/games/i/nealfun.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
  { title: "Coming Soon", url: "https://defrostee.github.io/defrost/page/games/g/soon.html", img: "https://defrostee.github.io/defrost/page/games/i/soon.png" },
];

  const PER_PAGE = 9;
  let filtered = [...ALL_GAMES], page = 0;

  const grid   = document.getElementById('grid');
  const prev   = document.getElementById('prev');
  const next   = document.getElementById('next');
  const curEl  = document.getElementById('cur');
  const totEl  = document.getElementById('total');
  const search = document.getElementById('search');

  function totalPages() { return Math.max(1, Math.ceil(filtered.length / PER_PAGE)); }

  function render(animIn) {
    const tp = totalPages();
    curEl.textContent = page + 1;
    totEl.textContent = tp;
    prev.disabled = page === 0;
    next.disabled = page >= tp - 1;
    const slice = filtered.slice(page * PER_PAGE, page * PER_PAGE + PER_PAGE);
    grid.innerHTML = slice.length === 0
      ? '<div class="empty">No results found.</div>'
      : slice.map(g => `<a href="${g.url}" class="card"><img src="${g.img}" alt="${g.title}" style="color:transparent"><span class="card-label">${g.title}</span></a>`).join('');
    grid.classList.remove('anim-in-right','anim-in-left','anim-out-right','anim-out-left');
    void grid.offsetWidth;
    grid.classList.add(animIn === 1 ? 'anim-in-right' : 'anim-in-left');
  }

  function changePage(dir, animIn) {
    grid.classList.remove('anim-in-right','anim-in-left','anim-out-right','anim-out-left');
    void grid.offsetWidth;
    grid.classList.add(animIn === 1 ? 'anim-out-left' : 'anim-out-right');
    setTimeout(() => { page += dir; render(animIn); }, 180);
  }

  next.addEventListener('click', () => { if (page < totalPages()-1) changePage(1, 1); });
  prev.addEventListener('click', () => { if (page > 0) changePage(-1, -1); });
  search.addEventListener('input', () => {
    const q = search.value.trim().toLowerCase();
    filtered = q ? ALL_GAMES.filter(g => g.title.toLowerCase().includes(q)) : [...ALL_GAMES];
    page = 0; render(1);
  });

  render(1);
</script>
</body>
</html>
