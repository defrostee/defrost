<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>408 — Request Timeout</title>
<link rel="icon" type="image/png" href="images/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; height: 100%; }

  body {
    background: #000;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    color: #3a8fcf;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
  }

  .code {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(100px, 18vw, 180px);
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #fff;
    line-height: 1;
  }

  .bar {
    width: 80px;
    height: 2px;
    background: #3a8fcf;
    margin: 12px 0 20px 0;
  }

  .msg {
    font-size: clamp(12px, 1.6vw, 16px);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #3a8fcf;
    margin-bottom: 36px;
  }

  .back {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #3a8fcf;
    text-decoration: none;
    border: 1px solid #1a3a5c;
    padding: 10px 20px;
    transition: color 0.2s, border-color 0.2s;
  }
  .back:hover { color: #00c8ff; border-color: #00c8ff; }
</style>
</head>
<body>
<div class="wrap">
  <div class="code">408</div>
  <div class="bar"></div>
  <div class="msg">PS 408 Request Time Out!</div>
  <a href="https://defrostee.github.io/page/games/" class="back">← Back to Games</a>
</div>
</body>
</html>
