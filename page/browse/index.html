<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defrost | Browse</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; scrollbar-width: none; }
  ::-webkit-scrollbar { display: none; }
  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    color: #3a8fcf;
  }
  .container { width: min(700px, 92vw); display: flex; flex-direction: column; }
  .page-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 6px;
  }
  .page-sub {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: #1e4d7b; margin-bottom: 22px;
  }
  .url-row { display: flex; gap: 8px; margin-bottom: 10px; }
  #url-input {
    flex: 1; background: #000; border: 1px solid #1a3a5c;
    color: #a8d8f0; font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 0.05em; padding: 10px 14px;
    outline: none; transition: border-color 0.2s;
  }
  #url-input::placeholder { color: #1e4d7b; }
  #url-input:focus { border-color: #3a8fcf; }
  .go-btn {
    background: #000; border: 1px solid #1a3a5c; color: #3a8fcf;
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 10px 20px; cursor: pointer;
    transition: border-color 0.2s, color 0.2s; white-space: nowrap;
  }
  .go-btn:hover { border-color: #00c8ff; color: #00c8ff; }
  .error-msg {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: #7b1e1e; min-height: 14px; margin-bottom: 10px;
  }
  .section-label {
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: #1e4d7b; margin-bottom: 10px;
  }
  .quick-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: clamp(6px, 1vw, 10px); margin-bottom: 16px;
  }
  .quick-card {
    background: #0a0a0a; border: 1px solid #1a3a5c;
    padding: 12px 10px; cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    text-align: center; display: flex; flex-direction: column;
    gap: 5px; align-items: center;
  }
  .quick-card:hover { border-color: #00c8ff; transform: translateY(-2px); }
  .quick-icon { font-size: 18px; line-height: 1; }
  .quick-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #3a8fcf; }
</style>
</head>
<body>
<div class="container">
  <div class="page-title">EUGENEX</div>
  <div class="page-sub">Private Web Access — Powered by DEFROST</div>

  <div class="url-row">
    <input type="text" id="url-input" placeholder="Enter URL or search..." autocomplete="off" spellcheck="false">
    <button class="go-btn" id="go-btn">GO →</button>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="section-label">Quick Access</div>
  <div class="quick-grid">
    <div class="quick-card" data-url="https://google.com">
      <div class="quick-icon">🔍</div><div class="quick-label">Google</div>
    </div>
    <div class="quick-card" data-url="https://youtube.com">
      <div class="quick-icon">▶</div><div class="quick-label">YouTube</div>
    </div>
    <div class="quick-card" data-url="https://discord.com">
      <div class="quick-icon">💬</div><div class="quick-label">Discord</div>
    </div>
    <div class="quick-card" data-url="https://reddit.com">
      <div class="quick-icon">↑</div><div class="quick-label">Reddit</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@latest/dist/uv.bundle.js"></script>
<script src="/page/browse/uv.config.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/page/browse/uv.sw.js', { scope: '/service/' })
      .catch(err => console.error('SW registration failed:', err));
  }

  const urlInput = document.getElementById('url-input');
  const goBtn    = document.getElementById('go-btn');
  const errorMsg = document.getElementById('error-msg');

  function normalise(raw) {
    raw = raw.trim();
    if (!raw) return null;
    if (!/^https?:\/\//i.test(raw) && !raw.includes('.')) {
      return 'https://www.google.com/search?q=' + encodeURIComponent(raw);
    }
    if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
    try { new URL(raw); return raw; } catch { return null; }
  }

  function navigate(raw) {
    errorMsg.textContent = '';
    const url = normalise(raw);
    if (!url) { errorMsg.textContent = 'Invalid URL.'; return; }
    const encoded = __uv$config.encodeUrl(url);
    window.location.href = __uv$config.prefix + encoded;
  }

  goBtn.addEventListener('click', () => navigate(urlInput.value));
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(urlInput.value); });

  document.querySelectorAll('.quick-card').forEach(card => {
    card.addEventListener('click', () => {
      urlInput.value = card.dataset.url;
      navigate(card.dataset.url);
    });
  });
</script>
</body>
</html>
