<body>
<div class="container">
  <a href="../../index.html" class="back">← Back</a>
  <div class="page-title">EUGENEX</div>
  <div class="page-sub">Private Web Access — Powered by DEFROST</div>

  <div class="url-row">
    <input type="text" id="url-input" placeholder="Enter URL or search..." autocomplete="off" spellcheck="false">
    <button class="go-btn" id="go-btn">GO →</button>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="section-label">Quick Access</div>
  <div class="quick-grid">
    <div class="quick-card" data-url="https://google.com">
      <div class="quick-icon">🔍</div>
      <div class="quick-label">Google</div>
    </div>
    <div class="quick-card" data-url="https://youtube.com">
      <div class="quick-icon">▶</div>
      <div class="quick-label">YouTube</div>
    </div>
    <div class="quick-card" data-url="https://discord.com">
      <div class="quick-icon">💬</div>
      <div class="quick-label">Discord</div>
    </div>
    <div class="quick-card" data-url="https://reddit.com">
      <div class="quick-icon">↑</div>
      <div class="quick-label">Reddit</div>
    </div>
  </div>

  <div class="frame-wrap" id="frame-wrap">
    <div class="frame-toolbar">
      <span class="frame-toolbar-label">EUGENEX</span>
      <span class="frame-url-display" id="frame-url-display">—</span>
      <button class="frame-close" id="frame-close">✕</button>
    </div>
    <iframe id="proxy-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals" allowfullscreen></iframe>
  </div>
</div>

<script>
  const WORKER_URL = 'https://eugenex-server.onrender.com';

  const urlInput     = document.getElementById('url-input');
  const goBtn        = document.getElementById('go-btn');
  const frameWrap    = document.getElementById('frame-wrap');
  const proxyFrame   = document.getElementById('proxy-frame');
  const frameUrlDisp = document.getElementById('frame-url-display');
  const frameClose   = document.getElementById('frame-close');
  const errorMsg     = document.getElementById('error-msg');

  function normaliseURL(raw) {
    raw = raw.trim();
    if (!raw) return null;
    if (!/^https?:\/\//i.test(raw) && !raw.includes('.')) {
      return 'https://www.google.com/search?q=' + encodeURIComponent(raw);
    }
    if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
    try { new URL(raw); return raw; } catch { return null; }
  }

  function navigate(rawURL) {
    errorMsg.textContent = '';
    const target = normaliseURL(rawURL);
    if (!target) { errorMsg.textContent = 'Invalid URL.'; return; }
    const proxied = WORKER_URL + '/proxy?url=' + encodeURIComponent(target);
    frameUrlDisp.textContent = target;
    proxyFrame.src = proxied;
    frameWrap.classList.add('visible');
  }

  goBtn.addEventListener('click', () => navigate(urlInput.value));
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(urlInput.value); });

  document.querySelectorAll('.quick-card').forEach(card => {
    card.addEventListener('click', () => {
      urlInput.value = card.dataset.url;
      navigate(card.dataset.url);
    });
  });

  frameClose.addEventListener('click', () => {
    frameWrap.classList.remove('visible');
    proxyFrame.src = 'about:blank';
    frameUrlDisp.textContent = '—';
  });
</script>
</body>
